<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>We'll Be Right Back</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="maintenance-wrapper">
        <!-- Pure CSS Visual Section: Mechanical Engineering Vibe -->
        <div class="visual-container">
            <div class="gear-system">
                <div class="gear main-gear">
                    <div class="tooth"></div><div class="tooth"></div>
                    <div class="tooth"></div><div class="tooth"></div>
                    <div class="gear-core"></div>
                </div>
                <div class="gear secondary-gear">
                    <div class="tooth"></div><div class="tooth"></div>
                    <div class="tooth"></div><div class="tooth"></div>
                    <div class="gear-core"></div>
                </div>
            </div>
        </div>

        <!-- Content Section -->
        <div class="content-container">
            <div class="status-indicator"><span class="pulse-dot"></span>Scheduled Upgrades</div>
            <h1 class="heading">Engine Tuning Underway</h1>
            <p class="description">We are shifting coordinates and upgrading our system architecture for performance enhancement. We'll stabilize shortly.</p>

            <div class="meta-info">
                <span class="est-time">Estimated Restorations: <strong>~30 Mins</strong></span>
            </div>
        </div>
    </main>
</body>
</html>
