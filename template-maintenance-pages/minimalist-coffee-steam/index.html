<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Under Maintenance</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="coffee-wrapper">
        <!-- Pure CSS Visual Section: Elegant Coffee & Steam -->
        <div class="visual-container">
            <div class="coffee-cup">
                <div class="steam-container">
                    <span class="steam-line"></span>
                    <span class="steam-line"></span>
                    <span class="steam-line"></span>
                </div>
                <div class="cup-handle"></div>
            </div>
            <div class="cup-saucer"></div>
        </div>

        <!-- Content Section -->
        <div class="content-container">
            <div class="badge-server">SERVER_UPDATE</div>
            <h1 class="heading">Taking a Quick Break</h1>
            <p class="description">We are brewing something fresh behind the scenes. Our digital doors will open as soon as the system updates finish cooking.</p>

            <div class="progress-bar-container">
                <div class="progress-bar"></div>
            </div>
        </div>
    </main>
</body>
</html>
