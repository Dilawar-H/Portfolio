<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - TERMINAL_ERROR</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="glitch-wrapper">
        <!-- Visual Section: Large Glitch Text -->
        <div class="visual-container">
            <h1 class="glitch-code" data-text="404">404</h1>
            <div class="scanline"></div>
        </div>

        <!-- Content Section -->
        <div class="content-container">
            <div class="terminal-badge">SECURITY_ALERT: SYSTEM_FAILURE</div>
            <h2 class="error-heading">Link_Broken: Connection Lost</h2>
            <p class="error-text">The requested execution path does not exist on this server core. Try exploring alternative terminals below.</p>

            <!-- Quick Nav Links for High Retention -->
            <div class="nav-links">
                <a href="/" class="btn-cyber">_Home</a>
                <a href="/blog" class="btn-cyber-secondary">_Blog</a>
                <a href="/services" class="btn-cyber-secondary">_Services</a>
            </div>
        </div>
    </main>
</body>
</html>
