<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Lost in Space</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="space-wrapper">
        <!-- Pure CSS Visual Section (No Images!) -->
        <div class="visual-container">
            <div class="planet">
                <div class="crater"></div>
                <div class="crater"></div>
                <div class="crater"></div>
            </div>
            <div class="rocket">🚀</div>
        </div>

        <!-- Text Section -->
        <div class="content-container">
            <h1 class="error-code">404</h1>
            <h2 class="error-heading">You've drifted into deep space</h2>
            <p class="error-text">The page you are looking for has vanished into a black hole.</p>
            <a href="/" class="btn-earth">Return to Earth</a>
        </div>
    </main>
</body>
</html>
