<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Launching Soon</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Abstract Glow Background Vectors (Pure CSS, No Images) -->
    <div class="bg-glow-1"></div>
    <div class="bg-glow-2"></div>

    <main class="launch-container">
        <!-- Header Branding -->
        <header class="brand-header">
            <div class="logo">_PROJECT.CORE</div>
        </header>

        <!-- Main Heading Section -->
        <section class="content-section">
            <h1 class="heading">Next-Gen Architecture Is Cooking</h1>
            <p class="subtext">We are assembling a clean, lightning-fast experience. Drop your email to get early beta access and exclusive launch updates.</p>
        </section>

        <!-- Dynamic Countdown Timer -->
        <section class="timer-section">
            <div class="countdown-board">
                <div class="time-box">
                    <span class="number" id="days">00</span>
                    <span class="label">Days</span>
                </div>
                <div class="time-box">
                    <span class="number" id="hours">00</span>
                    <span class="label">Hrs</span>
                </div>
                <div class="time-box">
                    <span class="number" id="minutes">00</span>
                    <span class="label">Mins</span>
                </div>
                <div class="time-box">
                    <span class="number" id="seconds">00</span>
                    <span class="label">Secs</span>
                </div>
            </div>
        </section>

        <!-- Lead Generation Form -->
        <section class="form-section">
            <form class="subscribe-form" action="#" method="POST">
                <input type="email" placeholder="Enter your email address" required autocomplete="off">
                <button type="submit" class="btn-submit">Notify Me</button>
            </form>
        </section>

        <!-- Social Media Architecture (SVG Icons Inline) -->
        <footer class="social-footer">
            <a href="#" aria-label="Twitter" class="social-icon">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
            </a>
            <a href="#" aria-label="LinkedIn" class="social-icon">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0z"/></svg>
            </a>
        </footer>
    </main>

    <!-- Script Injection -->
    <script src="app.js"></script>
</body>
</html>
