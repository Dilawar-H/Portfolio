<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Initializing...</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Matrix/Cyber Grid Overlay Layer -->
    <div class="cyber-grid"></div>

    <main class="cyber-wrapper">
        <!-- Terminal Status Bar -->
        <div class="status-badge">// STATUS: SYSTEM_INITIALIZING...</div>

        <!-- Main Cyber Heading -->
        <section class="glitch-section">
            <h1 class="cyber-title" data-text="DECRYPTING THE FUTURE">DECRYPTING THE FUTURE</h1>
            <p class="cyber-subtitle">Our new digital architecture is under construction. Establish link to secure priority access.</p>
        </section>

        <!-- Neon Grid Countdown -->
        <section class="neon-timer-grid">
            <div class="neon-box">
                <span class="cyber-num" id="days">00</span>
                <span class="cyber-label">DAYS</span>
            </div>
            <div class="neon-box">
                <span class="cyber-num" id="hours">00</span>
                <span class="cyber-label">HOURS</span>
            </div>
            <div class="neon-box">
                <span class="cyber-num" id="minutes">00</span>
                <span class="cyber-label">MINS</span>
            </div>
            <div class="neon-box">
                <span class="cyber-num" id="seconds">00</span>
                <span class="cyber-label">SECS</span>
            </div>
        </section>

        <!-- Command Line Subscription Input -->
        <section class="terminal-form-zone">
            <form class="cyber-form" action="#" method="POST">
                <div class="input-wrapper">
                    <span class="terminal-prompt">></span>
                    <input type="email" placeholder="ENTER_EMAIL_ADDRESS..." required autocomplete="off">
                </div>
                <button type="submit" class="cyber-btn">CONNECT_LINK</button>
            </form>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
